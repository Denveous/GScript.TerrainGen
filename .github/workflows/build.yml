name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: TerrainGenerator-windows-x64
            binary: TerrainGenerator.exe
            package: TerrainGenerator-windows-x64.zip
          - os: ubuntu-latest
            artifact: TerrainGenerator-linux-x64
            binary: TerrainGenerator
            package: TerrainGenerator-linux-x64.tar.gz
          - os: macos-14
            artifact: TerrainGenerator-macos-x64
            binary: TerrainGenerator
            package: TerrainGenerator-macos-x64.tar.gz

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libgl1-mesa-dev libglu1-mesa-dev libx11-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Create package directory
        run: cmake -E make_directory release

      - name: Package Windows executable
        if: runner.os == 'Windows'
        working-directory: bin
        run: cmake -E tar cf "../release/${{ matrix.package }}" --format=zip "${{ matrix.binary }}"

      - name: Package Unix executable
        if: runner.os != 'Windows'
        working-directory: bin
        run: cmake -E tar czf "../release/${{ matrix.package }}" "${{ matrix.binary }}"

      - name: Upload package
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.package }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@v7
        with:
          path: release
          merge-multiple: true

      - name: Tag and publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: build-${{ github.run_number }}
        run: gh release create "$RELEASE_TAG" release/* --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "TerrainGenerator build $GITHUB_RUN_NUMBER" --generate-notes --latest
